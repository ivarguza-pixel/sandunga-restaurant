<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS: Propiedad font-size</title>
  <style>
    .sol {
      font-size: 64px;
      color: orange;
    }
    .tierra {
      font-size: 48px;
      color: dodgerblue;
    }
    .luna {
      font-size: 20px;
      color: gray;
    }
  </style>
</head>
<body>
  <h1>¿Quién es más grande?</h1>
  <p class="sol">Sol ☀️</p>
  <p class="tierra">Tierra 🌍</p>
  <p class="luna">Luna 🌙</p>
</body>
</html>
